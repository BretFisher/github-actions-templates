---
name: Grype Scan Image

on:
  workflow_call:
  
    inputs:
      image:
        # 'ghcr.io/${{ github.repository }}:${{ github.sha }}'
        description: Image to scan
        required: true
        type: string
      fail-build:
        description: true if you want the job to fail when CVEs are found at or above the selected severity cutoff
        required: false
        type: boolean
        default: false
      severity-cutoff:
        description: "Minimum severity to trigger a failure: negligible, low, medium, high, or critical"
        required: false
        type: string
        default: high
      only-fixed:
        description: Only report vulnerabilities that have fixes available
        required: false
        type: boolean
        default: true
      upload-results:
        description: Upload scan results to GitHub Security tab
        required: false
        type: boolean
        default: false
    
    secrets:
      registry-username:
        description: Username for registry
        required: true
      registry-password:
        description: Password for registry
        required: true

jobs:
  build:
    name: CVE Image Scan

    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      
      - name: Run Grype vulnerability scanner
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 #v7.4.0
        with:
          image: ${{ inputs.image }}
          registry-username: ${{ secrets.registry-username }} # zizmor: ignore[secrets-outside-env] Reusable workflow inputs are passed as workflow_call secrets. This template intentionally demonstrates that pattern rather than requiring GitHub Environments in every caller repo.
          registry-password: ${{ secrets.registry-password }} # zizmor: ignore[secrets-outside-env] Reusable workflow inputs are passed as workflow_call secrets. This template intentionally demonstrates that pattern rather than requiring GitHub Environments in every caller repo.
          fail-build: ${{ inputs.fail-build }}
          severity-cutoff: ${{ inputs.severity-cutoff }}
          only-fixed: ${{ inputs.only-fixed }}
          output-format: sarif

      - name: Upload Grype scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 #v4.35.2
        if: always() && inputs.upload-results
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
